openapi: 3.0.3
info:
  title: jqtools serialServer API
  version: 1.0.0
  description: |
    API for serialServer.js (HTTP). WebSocket is documented in api.md.
    Note: Ports are dynamically allocated. Default API port is 19245, default WS port is 19999.
    When ports conflict, the system automatically finds available ports.
servers:
  - url: http://localhost:19245
    description: Default API server (port may change if 19245 is occupied)
paths:
  /:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
  /bindKey:
    post:
      summary: Bind key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /selectSystem:
    post:
      summary: Select system
      parameters:
        - in: query
          name: file
          schema:
            type: string
      responses:
        '200':
          description: No body (current implementation)
  /getSystem:
    get:
      summary: Get system list and current system
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getPort:
    get:
      summary: Get serial ports
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /connPort:
    get:
      summary: Connect ports
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /startCol:
    post:
      summary: Start collecting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, select]
              properties:
                fileName:
                  type: string
                select:
                  type: object
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /endCol:
    get:
      summary: Stop collecting
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getColHistory:
    get:
      summary: Get collection history list
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /downlaod:
    post:
      summary: Download CSV
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileArr]
              properties:
                fileArr:
                  type: array
                  items:
                    type: string
                selectJson:
                  type: object
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /delete:
    post:
      summary: Delete records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileArr]
              properties:
                fileArr:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /changeDbName:
    post:
      summary: Change record date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newDate, oldDate]
              properties:
                newDate:
                  type: string
                oldDate:
                  type: string
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getDbHistory:
    post:
      summary: Get history data by date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [time]
              properties:
                time:
                  type: string
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getDbHistorySelect:
    post:
      summary: Get history selected area/press from cached historyDbArr
      description: Requires calling /getDbHistory first to populate cache. selectJson is cached until /getDbHistory or /startCol clears it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [selectJson]
              properties:
                selectJson:
                  type: object
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getContrastData:
    post:
      summary: Get contrast data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [left, right]
              properties:
                left:
                  type: string
                right:
                  type: string
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /changeDbDataName:
    post:
      summary: Change data name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldName, newName]
              properties:
                oldName:
                  type: string
                newName:
                  type: string
      responses:
        '200':
          description: No body (current implementation)
  /upsertRemark:
    post:
      summary: Upsert remark/alias/select
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date]
              properties:
                date:
                  type: string
                alias:
                  type: string
                remark:
                  type: string
                select:
                  type: object
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getRemark:
    post:
      summary: Get remark
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date]
              properties:
                date:
                  type: string
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /cancalDbPlay:
    post:
      summary: Cancel playback
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getDbHistoryPlay:
    post:
      summary: Start playback
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /changeDbplaySpeed:
    post:
      summary: Change playback speed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [speed]
              properties:
                speed:
                  type: number
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /changeSystemType:
    post:
      summary: Change system type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [system]
              properties:
                system:
                  type: string
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getDbHistoryStop:
    post:
      summary: Stop playback
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getDbHistoryIndex:
    post:
      summary: Jump to playback index
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [index]
              properties:
                index:
                  type: integer
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getCsvData:
    post:
      summary: Read CSV data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName]
              properties:
                fileName:
                  type: string
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /sendMac:
    get:
      summary: Send AT command to get device unique ID
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
  /getSysconfig:
    post:
      summary: Encrypt config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config:
                  type: object
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpResult'
components:
  schemas:
    HttpResult:
      type: object
      required: [code, data, msg]
      properties:
        code:
          type: number
          description: 0 success, non-0 failure
        data:
          description: Business payload
          nullable: true
        msg:
          type: string

