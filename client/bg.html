<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>数字矩阵 - 静态红色背景</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { border: 1px solid #444; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(512, 512);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(0, 10, 0, -10, 0.1, 10);
    camera.position.z = 5;

    // 数字图集纹理（16x16）
    function createDigitSpriteSheet() {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = 512;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, 512, 512);
      ctx.fillStyle = "white";
      ctx.font = "bold 28px monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (let i = 0; i < 256; i++) {
        const x = i % 16;
        const y = Math.floor(i / 16);
        ctx.fillText(i.toString(), x * 32 + 16, y * 32 + 16);
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.flipY = false;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.NearestFilter;
      return tex;
    }

    const texture = createDigitSpriteSheet();

    const material = new THREE.ShaderMaterial({
      uniforms: {
        map: { value: texture },
        tileSize: { value: 1.0 / 16.0 }
      },
      vertexShader: `
        attribute vec2 uvOffset;
        varying vec2 vUv;
        uniform float tileSize;
        void main() {
          vUv = uv * tileSize + uvOffset;
          gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D map;
        varying vec2 vUv;

        void main() {
          vec4 texColor = texture2D(map, vUv);
          vec3 bgColor = vec3(1.0, 0.0, 0.0); // 🔴 红色背景

          if (texColor.a < 0.1) {
            gl_FragColor = vec4(bgColor, 1.0);
            return;
          }

          vec3 finalColor = mix(bgColor, texColor.rgb, texColor.a);
          gl_FragColor = vec4(finalColor, 1.0);
        }
      `,
      transparent: false,
      side: THREE.DoubleSide
    });

    const gridSize = 10;
    const count = gridSize * gridSize;
    const geometry = new THREE.PlaneGeometry(1, 1);
    const uvOffsets = new Float32Array(count * 2);
    const dummy = new THREE.Object3D();

    const mesh = new THREE.InstancedMesh(geometry, material, count);
    for (let i = 0; i < count; i++) {
      const x = i % gridSize;
      const y = Math.floor(i / gridSize);
      dummy.position.set(x + 0.5, -y - 0.5, 0);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);

      const d = Math.floor(Math.random() * 256);
      uvOffsets[i * 2] = (d % 16) / 16;
      uvOffsets[i * 2 + 1] = Math.floor(d / 16) / 16;
    }

    geometry.setAttribute("uvOffset", new THREE.InstancedBufferAttribute(uvOffsets, 2));
    mesh.rotation.z = -Math.PI / 2; // 修正方向
    scene.add(mesh);

    renderer.render(scene, camera);
  </script>
</body>
</html>
