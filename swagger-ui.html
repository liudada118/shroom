<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swagger UI - jqtools serialServer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"
    />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      #swagger-ui { height: 100%; }
      .topbar { display: none; }
    </style>
  </head>
  <body>
    <div style="padding: 12px 16px; font: 14px/1.4 sans-serif; background: #fff7e6; border-bottom: 1px solid #ffe0b2;">
      提示：/downlaod 支持可选 <code>selectJson</code>；/getDbHistorySelect 会缓存 <code>selectJson</code>，在调用 <code>/getDbHistory</code> 或 <code>/startCol</code> 时清空。
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = function () {
        window.ui = SwaggerUIBundle({
          url: './swagger.yaml',
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset
          ],
          layout: 'StandaloneLayout'
        });
      };
    </script>
  </body>
</html>
